events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    upstream app_backend {
        server app:8000;
    }

    # HTTP → редирект на HTTPS
    server {
        listen 80;
        server_name xn--80aefdbay6ajft0f.xn--p1ai;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name xn--80aefdbay6ajft0f.xn--p1ai;

        ssl_certificate     /etc/letsencrypt/live/xn--80aefdbay6ajft0f.xn--p1ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xn--80aefdbay6ajft0f.xn--p1ai/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ----- Загруженные медиафайлы (из volume) -----
        location /static/media/ {
            alias /usr/share/nginx/media/;
            limit_req zone=static burst=50 nodelay;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }

        # ----- Остальная статика (шрифты, иконки) → через app -----
        location /static/ {
            limit_req zone=static burst=50 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ----- API -----
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ----- Admin API -----
        location /admin-api/ {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Админка -----
        location /admin/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- CRM заказов -----
        location /crm/ {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Webhook бота -----
        location /bot/ {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Healthcheck -----
        location /health {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
        }

        # ----- Mini App -----
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            limit_req zone=static burst=50 nodelay;
        }

        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
