events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Gzip для статики и API
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Безопасность: скрыть версию nginx
    server_tokens off;

    # Rate limit (базовый)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    upstream app_backend {
        server app:8000;
    }

    server {
        listen 80;
        server_name _;

        # HTTP → HTTPS (в проде; для dev можно убрать)
        # return 301 https://$host$request_uri;

        # ----- Статика Mini App и медиа (быстрая раздача, без proxy) -----
        location /static/ {
            alias /usr/share/nginx/media/;
            limit_req zone=static burst=50 nodelay;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ----- API, админка, webhooks → проксирование на app -----
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /admin/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Healthcheck (без rate limit) -----
        location /health {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
        }

        # ----- Корень: Mini App (index.html) -----
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            limit_req zone=static burst=50 nodelay;
        }

        # --- Секьюрити: закрыть стандартные уязвимые пути ---
        location ~ /\. {
            deny all;
            return 404;
        }
    }

    # --- HTTPS server (раскомментировать после получения сертификата) ---
    # server {
    #     listen 443 ssl http2;
    #     server_name miniteatree.example.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #
    #     # ... те же location'ы, что выше ...
    # }
}
