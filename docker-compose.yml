# ============================================================
#  MiniTeaTree — production-flavored compose (используется и в dev)
#  Переопределения для разработки — в docker-compose.dev.yml
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: miniteatree_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miniteatree_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS}
      TELEGRAM_INITDATA_MAX_AGE_SECONDS: ${TELEGRAM_INITDATA_MAX_AGE_SECONDS}
      YOOKASSA_PROVIDER_TOKEN: ${YOOKASSA_PROVIDER_TOKEN}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_WEBHOOK_URL: ${YOOKASSA_WEBHOOK_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      # Загруженные фото и статика Mini App
      - media_data:/app/app/static/media
    ports:
      # В проде对外 открыт только nginx (80/443). Для локальной разработки удобен порт app.
      - "127.0.0.1:8000:8000"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: miniteatree_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_data:/usr/share/nginx/media:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - internal

volumes:
  postgres_data:
  media_data:

networks:
  internal:
    driver: bridge
