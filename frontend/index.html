<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чайное Дерево</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#166534',
              600: '#14532d',
              700: '#052e16',
              800: '#022c22',
              900: '#011e17',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f0fdf4;
      -webkit-font-smoothing: antialiased;
    }
    /* Custom scrollbar for Telegram style */
    ::-webkit-scrollbar { width: 0; height: 0; }
    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    /* Bottom nav */
    .nav-item { transition: color 0.2s; }
    .nav-item.active { color: #166534; }
    .nav-item:not(.active) { color: #6b7280; }
    /* Badge */
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: #dc2626; color: white; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; padding: 0 4px;
    }
  </style>
</head>
<body class="max-w-lg mx-auto min-h-screen pb-20">

  <!-- ===== Top Bar ===== -->
  <header class="sticky top-0 z-30 bg-brand-500 text-white px-4 py-3 flex items-center gap-3 shadow-md">
    <div id="back-btn" class="hidden cursor-pointer p-1 -ml-1" onclick="App.goBack()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </div>
    <h1 id="header-title" class="text-lg font-bold flex-1">🌿 Чайное Дерево</h1>
  </header>

  <!-- ===== Main Content ===== -->
  <main id="app-content" class="px-4 py-4">
    <!-- Dynamic content rendered here by JS -->
  </main>

  <!-- ===== Bottom Navigation ===== -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-white border-t border-gray-200 z-30">
    <div class="flex justify-around py-2">
      <button class="nav-item flex flex-col items-center gap-0.5 px-3 py-1" data-view="home" onclick="App.navigate('home')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/>
        </svg>
        <span class="text-xs">Главная</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-0.5 px-3 py-1" data-view="catalog" onclick="App.navigate('catalog')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <span class="text-xs">Каталог</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-0.5 px-3 py-1 relative" data-view="cart" onclick="App.navigate('cart')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4m1.6 8l-1.68 8H18M7 13L5.4 5M7 13l-2.68 8m0 0a2 2 0 104 0m-4 0a2 2 0 114 0m10-8a2 2 0 104 0m-4 0a2 2 0 114 0"/>
        </svg>
        <span class="text-xs">Корзина</span>
        <span id="cart-badge" class="cart-badge hidden">0</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-0.5 px-3 py-1" data-view="profile" onclick="App.navigate('profile')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs">Профиль</span>
      </button>
    </div>
  </nav>

  <!-- ===== JavaScript ===== -->
  <script>
  // ---------- Telegram WebApp Init ----------
  const tg = window.Telegram?.WebApp || null;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#166534');
    tg.setBackgroundColor('#f0fdf4');
  }

  const API_BASE = '/api';

  // ---------- API Helper ----------
  const authHeaders = () => {
    const h = { 'Content-Type': 'application/json' };
    if (tg?.initDataUnsafe?.user) {
      h['Authorization'] = `Bearer ${tg.initData}`;
    } else {
      // Dev fallback: store token in localStorage.
      const t = localStorage.getItem('access_token');
      if (t) h['Authorization'] = `Bearer ${t}`;
    }
    return h;
  };

  async function api(path, opts = {}) {
    const url = API_BASE + path;
    const res = await fetch(url, {
      ...opts,
      headers: { ...authHeaders(), ...(opts.headers || {}) },
    });
    if (res.status === 204) return null;
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Ошибка');
    }
    return res.json();
  }

  // ---------- App State ----------
  const App = {
    currentView: 'home',
    viewStack: [],
    categories: [],
    cartCount: 0,

    // ----- Navigation -----
    navigate(view, data) {
      if (this.currentView !== view) {
        this.viewStack.push(this.currentView);
      }
      this.currentView = view;
      this.render(view, data);
      this.updateNav(view);
      this.updateBackBtn();
      window.scrollTo(0, 0);
    },

    goBack() {
      if (this.viewStack.length) {
        this.currentView = this.viewStack.pop();
        this.render(this.currentView);
        this.updateNav(this.currentView);
        this.updateBackBtn();
        window.scrollTo(0, 0);
      }
    },

    updateNav(view) {
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.view === view);
      });
    },

    updateBackBtn() {
      const btn = document.getElementById('back-btn');
      const show = this.currentView !== 'home' && this.currentView !== 'catalog';
      btn.classList.toggle('hidden', !show);
    },

    setHeader(title) {
      document.getElementById('header-title').textContent = title;
    },

    // ----- Render -----
    async render(view, data) {
      const c = document.getElementById('app-content');
      try {
        switch (view) {
          case 'home': await this.renderHome(c); break;
          case 'catalog': await this.renderCatalog(c, data); break;
          case 'product': await this.renderProduct(c, data); break;
          case 'cart': await this.renderCart(c); break;
          case 'checkout': await this.renderCheckout(c); break;
          case 'order-detail': await this.renderOrderDetail(c, data); break;
          case 'profile': await this.renderProfile(c); break;
          default: c.innerHTML = '<p class="text-gray-500">Страница не найдена</p>';
        }
      } catch (e) {
        c.innerHTML = `<div class="text-center py-10"><p class="text-red-500">⚠️ ${e.message}</p><button onclick="App.navigate('home')" class="mt-4 text-brand-500 underline">На главную</button></div>`;
      }
    },

    // ----- Home -----
    async renderHome(c) {
      this.setHeader('🌿 Чайное Дерево');
      const [banners, cats] = await Promise.all([
        api('/info/banners'),
        api('/catalog/categories'),
      ]);
      this.categories = cats;

      let html = '';

      // Banners
      if (banners.length) {
        html += `<div class="mb-6">
          <div class="flex overflow-x-auto gap-3 -mx-4 px-4 snap-x">
            ${banners.map(b => `
              <div class="snap-start shrink-0 w-72 rounded-xl overflow-hidden bg-white shadow-sm">
                <img src="${b.image_path}" alt="${b.title||''}" class="w-full h-36 object-cover bg-gray-200"/>
                ${b.title ? `<div class="p-3"><h3 class="font-semibold text-brand-600">${esc(b.title)}</h3>${b.subtitle?`<p class="text-sm text-gray-500 mt-1">${esc(b.subtitle)}</p>`:''}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>`;
      }

      // Categories grid
      html += `<h2 class="text-lg font-bold text-brand-700 mb-3">Категории</h2>`;
      html += `<div class="grid grid-cols-2 gap-3 mb-6">
        ${cats.map(cat => `
          <button onclick="App.navigate('catalog', '${cat.slug}')"
            class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow text-left border border-brand-100">
            <div class="text-2xl mb-2">${cat.icon || '🍃'}</div>
            <span class="font-medium text-brand-600 text-sm">${esc(cat.name)}</span>
          </button>
        `).join('')}
      </div>`;

      // Popular (first 4 products)
      try {
        const products = await api('/catalog/products');
        if (products.length) {
          html += `<h2 class="text-lg font-bold text-brand-700 mb-3">Популярное</h2>`;
          html += `<div class="flex overflow-x-auto gap-3 -mx-4 px-4 pb-2">
            ${products.slice(0, 6).map(p => this._productCard(p)).join('')}
          </div>`;
        }
      } catch (_) {}

      c.innerHTML = html;
    },

    // ----- Catalog -----
    async renderCatalog(c, categorySlug) {
      this.setHeader('🍃 Каталог');
      const cats = this.categories.length ? this.categories : await api('/catalog/categories');
      this.categories = cats;

      const params = categorySlug ? `?category_slug=${categorySlug}` : '';
      const products = await api(`/catalog/products${params}`);

      let html = '';

      // Category pills
      html += `<div class="flex overflow-x-auto gap-2 -mx-4 px-4 pb-3 mb-4">
        <button onclick="App.navigate('catalog')" class="shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition ${!categorySlug ? 'bg-brand-500 text-white' : 'bg-white text-brand-600 border border-brand-200'}">Все</button>
        ${cats.map(cat => `
          <button onclick="App.navigate('catalog', '${cat.slug}')" class="shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition ${categorySlug===cat.slug ? 'bg-brand-500 text-white' : 'bg-white text-brand-600 border border-brand-200'}">${esc(cat.icon||'🍃')} ${esc(cat.name)}</button>
        `).join('')}
      </div>`;

      if (!products.length) {
        html += `<p class="text-center text-gray-400 py-10">Нет товаров в этой категории</p>`;
      } else {
        html += `<div class="grid grid-cols-2 gap-3">
          ${products.map(p => this._productCard(p)).join('')}
        </div>`;
      }

      c.innerHTML = html;
    },

    // ----- Product Detail -----
    async renderProduct(c, slug) {
      const p = await api(`/catalog/products/${slug}`);
      this.setHeader(p.name);

      let html = '';

      // Images carousel
      if (p.images.length) {
        html += `<div class="flex overflow-x-auto gap-2 -mx-4 px-4 pb-3">
          ${p.images.map(img => `<img src="${img.path}" alt="${esc(img.alt||'')}" class="w-full shrink-0 rounded-xl object-cover bg-gray-100" style="height:280px"/>`).join('')}
        </div>`;
      }

      // Info
      html += `<div class="bg-white rounded-xl p-4 shadow-sm -mt-3 relative z-10">
        <div class="flex items-start justify-between">
          <div>
            <h2 class="text-xl font-bold text-brand-700">${esc(p.name)}</h2>
            ${p.origin ? `<p class="text-sm text-gray-500 mt-0.5">📍 ${esc(p.origin)}</p>` : ''}
          </div>
          <span class="text-lg font-bold text-brand-500">от ${fmtPrice(Math.min(...p.variants.map(v=>v.price)))} ₽</span>
        </div>
        ${p.description ? `<p class="text-sm text-gray-600 mt-3 leading-relaxed">${esc(p.description)}</p>` : ''}
        ${p.tags.length ? `<div class="flex flex-wrap gap-1.5 mt-3">${p.tags.map(t => `<span class="px-2 py-0.5 bg-brand-50 text-brand-600 rounded-full text-xs">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>`;

      // Variants
      if (p.variants.length) {
        html += `<div class="mt-4 bg-white rounded-xl p-4 shadow-sm">
          <h3 class="font-bold text-brand-600 mb-3">Выберите вес</h3>
          <div class="grid grid-cols-2 gap-2">
            ${p.variants.map((v, i) => `
              <button onclick="App.addToCart(${v.id})"
                class="border ${v.in_stock ? 'border-brand-200 hover:bg-brand-50' : 'border-gray-200 opacity-50'} rounded-lg p-3 text-center transition">
                <div class="font-semibold text-brand-600">${v.weight_g} г</div>
                <div class="text-sm mt-1 ${v.in_stock ? 'text-gray-700' : 'text-gray-400'}">${fmtPrice(v.price)} ₽</div>
                ${!v.in_stock ? '<div class="text-xs text-red-400 mt-1">Нет в наличии</div>' : ''}
              </button>
            `).join('')}
          </div>
        </div>`;
      }

      c.innerHTML = html;
    },

    // ----- Cart -----
    async renderCart(c) {
      this.setHeader('🛒 Корзина');
      let html = '';

      try {
        const cart = await api('/cart');
        if (!cart.items.length) {
          html = `<div class="text-center py-16">
            <div class="text-6xl mb-4">🍵</div>
            <p class="text-gray-500">Корзина пуста</p>
            <button onclick="App.navigate('catalog')" class="mt-4 bg-brand-500 text-white px-6 py-2 rounded-full text-sm font-medium">Перейти в каталог</button>
          </div>`;
        } else {
          html = `<div class="space-y-3 mb-4">
            ${cart.items.map(item => `
              <div class="bg-white rounded-xl p-3 shadow-sm flex gap-3 items-center">
                <div class="w-16 h-16 rounded-lg bg-gray-100 flex-shrink-0 overflow-hidden">
                  ${item.main_image ? `<img src="${item.main_image}" class="w-full h-full object-cover"/>` : `<div class="w-full h-full flex items-center justify-center text-2xl">🍵</div>`}
                </div>
                <div class="flex-1 min-w-0">
                  <p class="font-medium text-brand-700 text-sm truncate">${esc(item.product_name)}</p>
                  <p class="text-xs text-gray-500">${item.variant.weight_g} г · ${fmtPrice(item.variant.price)} ₽</p>
                </div>
                <div class="flex items-center gap-2">
                  <button onclick="App.updateCartItem(${item.id}, ${item.quantity - 1})" class="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200">−</button>
                  <span class="w-6 text-center font-medium text-sm">${item.quantity}</span>
                  <button onclick="App.updateCartItem(${item.id}, ${item.quantity + 1})" class="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200">+</button>
                </div>
                <button onclick="App.removeCartItem(${item.id})" class="ml-1 text-gray-400 hover:text-red-500">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
            `).join('')}
          </div>`;

          // Total
          html += `<div class="bg-white rounded-xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-4">
              <span class="text-gray-600">Итого:</span>
              <span class="text-xl font-bold text-brand-600">${fmtPrice(cart.total_amount)} ₽</span>
            </div>
            <button onclick="App.checkout()" class="w-full bg-brand-500 hover:bg-brand-600 text-white py-3 rounded-xl font-medium transition">Оформить заказ</button>
          </div>`;
        }
      } catch (e) {
        if (e.message.includes('401') || e.message.includes('Unauthorized')) {
          html = `<div class="text-center py-16">
            <div class="text-6xl mb-4">🔒</div>
            <p class="text-gray-500">Войдите через Telegram</p>
          </div>`;
        } else {
          throw e;
        }
      }

      c.innerHTML = html;
    },

    // ----- Profile -----
    async renderProfile(c) {
      this.setHeader('👤 Профиль');
      let html = '';

      try {
        const user = await api('/profile/me');
        html = `<div class="bg-white rounded-xl p-5 shadow-sm mb-4">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-full bg-brand-100 flex items-center justify-center text-2xl">🌿</div>
            <div>
              <h2 class="font-bold text-brand-700 text-lg">${esc(user.first_name || '')} ${esc(user.last_name || '')}</h2>
              ${user.username ? `<p class="text-sm text-gray-500">@${esc(user.username)}</p>` : ''}
            </div>
          </div>
        </div>`;

        // My Orders
        try {
          const orders = await api('/orders');
          html += `<h3 class="font-bold text-brand-700 mb-3">Мои заказы</h3>`;
          if (!orders.length) {
            html += `<p class="text-gray-400 text-sm">Заказов пока нет</p>`;
          } else {
            html += `<div class="space-y-3">
              ${orders.map(o => `
                <button onclick="App.navigate('order-detail', '${o.number}')" class="bg-white rounded-xl p-4 shadow-sm w-full text-left">
                  <div class="flex justify-between items-start">
                    <span class="font-semibold text-brand-600">${o.number}</span>
                    <span class="text-sm px-2 py-0.5 rounded-full bg-brand-50 text-brand-600">${statusLabel(o.status_payment)}</span>
                  </div>
                  <p class="text-sm text-gray-500 mt-1">${fmtPrice(o.total_amount)} ₽ · ${fmtDate(o.created_at)} · ${o.items_count} шт.</p>
                </button>
              `).join('')}
            </div>`;
          }
        } catch (_) {
          html += `<p class="text-gray-400 text-sm">Заказы скоро появятся здесь</p>`;
        }
      } catch (e) {
        if (e.message.includes('401') || e.message.includes('Unauthorized')) {
          html = `<div class="text-center py-16">
            <div class="text-6xl mb-4">🔒</div>
            <p class="text-gray-500">Войдите через Telegram</p>
          </div>`;
        } else {
          throw e;
        }
      }

      c.innerHTML = html;
    },

    // ----- Checkout -----
    async renderCheckout(c) {
      this.setHeader('Оформление заказа');
      c.innerHTML = `
        <form id="checkout-form" class="space-y-4" onsubmit="App.submitOrder(event)">
          <div class="bg-white rounded-xl p-4 shadow-sm">
            <h3 class="font-bold text-brand-600 mb-3">Способ получения</h3>
            <div class="space-y-2">
              <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer has-[:checked]:border-brand-400 has-[:checked]:bg-brand-50">
                <input type="radio" name="delivery_type" value="pickup" checked class="accent-brand-500"/>
                <div>
                  <div class="font-medium text-sm">Самовывоз</div>
                  <div class="text-xs text-gray-500">Из магазина / пункта выдачи</div>
                </div>
              </label>
              <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer has-[:checked]:border-brand-400 has-[:checked]:bg-brand-50">
                <input type="radio" name="delivery_type" value="courier" class="accent-brand-500"/>
                <div>
                  <div class="font-medium text-sm">Курьер</div>
                  <div class="text-xs text-gray-500">Доставка по адресу</div>
                </div>
              </label>
            </div>
          </div>

          <div class="bg-white rounded-xl p-4 shadow-sm">
            <h3 class="font-bold text-brand-600 mb-3">Контакты</h3>
            <div class="space-y-3">
              <div>
                <label class="text-sm text-gray-600 mb-1 block">Телефон</label>
                <input type="tel" id="contact_phone" name="contact_phone" placeholder="+7 (999) 999-99-99"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-brand-400"/>
              </div>
              <div id="address-field">
                <label class="text-sm text-gray-600 mb-1 block">Адрес доставки</label>
                <input type="text" id="address" name="address" placeholder="Город, улица, дом, квартира"
                  class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-brand-400"/>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl p-4 shadow-sm">
            <label class="text-sm text-gray-600 mb-1 block">Комментарий к заказу</label>
            <textarea name="comment" rows="2" placeholder="Пожелания, уточнения..."
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-brand-400 resize-none"></textarea>
          </div>

          <button type="submit" id="submit-order-btn"
            class="w-full bg-brand-500 hover:bg-brand-600 text-white py-3.5 rounded-xl font-semibold text-base transition">
            Подтвердить заказ
          </button>
        </form>
      `;

      // Скрываем адрес для самовывоза
      document.querySelectorAll('input[name="delivery_type"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('address-field').style.display =
            r.value === 'courier' ? 'block' : 'none';
        });
      });
      document.getElementById('address-field').style.display = 'none';
    },

    async submitOrder(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-order-btn');
      btn.disabled = true;
      btn.textContent = 'Отправляем...';
      try {
        const form = e.target;
        const delivery_type = form.querySelector('input[name="delivery_type"]:checked').value;
        const body = {
          delivery_type,
          contact_phone: form.contact_phone.value || null,
          address: delivery_type === 'courier' ? (form.address.value || '') : '',
          comment: form.comment.value || null,
        };
        const order = await api('/orders', { method: 'POST', body: JSON.stringify(body) });
        this.cartCount = 0;
        this.updateCartBadge();
        tg?.HapticFeedback?.notificationOccurred('success');
        this.navigate('order-detail', order.number);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Подтвердить заказ';
        if (tg) tg.showPopup({ title: 'Ошибка', message: err.message, buttons: [{ type: 'ok' }] });
        else alert(err.message);
      }
    },

    // ----- Order Detail -----
    async renderOrderDetail(c, orderNumber) {
      this.setHeader('Заказ ' + orderNumber);
      const o = await api(`/orders/${orderNumber}`);

      const delivLabel = { pickup: 'Самовывоз', courier: 'Курьер', post: 'Почта' };
      const payLabel = { pending: 'Ожидает оплаты', paid: 'Оплачен', refunded: 'Возврат', failed: 'Ошибка', cancelled: 'Отменён' };
      const delivStatus = { new: 'Новый', confirmed: 'Подтверждён', shipped: 'Отправлен', delivered: 'Доставлен', cancelled: 'Отменён' };

      const payColor = { pending: 'bg-yellow-50 text-yellow-700', paid: 'bg-green-50 text-green-700', failed: 'bg-red-50 text-red-600', cancelled: 'bg-gray-100 text-gray-500', refunded: 'bg-blue-50 text-blue-600' };
      const delColor = { new: 'bg-blue-50 text-blue-600', confirmed: 'bg-brand-50 text-brand-600', shipped: 'bg-purple-50 text-purple-600', delivered: 'bg-green-50 text-green-700', cancelled: 'bg-gray-100 text-gray-500' };

      let html = `
        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
          <div class="flex items-start justify-between mb-3">
            <div>
              <h2 class="font-bold text-brand-700 text-lg">${o.number}</h2>
              <p class="text-xs text-gray-400 mt-0.5">${fmtDate(o.created_at)}</p>
            </div>
            <div class="flex flex-col gap-1 items-end">
              <span class="text-xs px-2 py-1 rounded-full font-medium ${payColor[o.status_payment] || 'bg-gray-100 text-gray-500'}">${payLabel[o.status_payment] || o.status_payment}</span>
              <span class="text-xs px-2 py-1 rounded-full font-medium ${delColor[o.status_delivery] || 'bg-gray-100 text-gray-500'}">${delivStatus[o.status_delivery] || o.status_delivery}</span>
            </div>
          </div>
          ${o.delivery_info ? `<p class="text-sm text-gray-500">${delivLabel[o.delivery_info.type] || o.delivery_info.type}${o.delivery_info.address ? ' · ' + esc(o.delivery_info.address) : ''}</p>` : ''}
        </div>

        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
          <h3 class="font-bold text-brand-600 mb-3">Состав заказа</h3>
          <div class="space-y-3">
            ${o.items.map(item => `
              <div class="flex justify-between items-center">
                <div>
                  <p class="text-sm font-medium text-brand-700">${esc(item.snapshot_name)}</p>
                  <p class="text-xs text-gray-500">${item.snapshot_weight_g} г · ${item.quantity} шт.</p>
                </div>
                <span class="text-sm font-semibold text-brand-600">${fmtPrice(item.unit_price * item.quantity)} ₽</span>
              </div>
            `).join('')}
          </div>
          <div class="border-t border-gray-100 mt-3 pt-3 flex justify-between items-center">
            <span class="font-bold text-gray-700">Итого</span>
            <span class="text-lg font-bold text-brand-600">${fmtPrice(o.total_amount)} ₽</span>
          </div>
        </div>`;

      if (o.comment) {
        html += `<div class="bg-white rounded-xl p-4 shadow-sm mb-4">
          <p class="text-sm text-gray-500 italic">${esc(o.comment)}</p>
        </div>`;
      }

      html += `<button onclick="App.navigate('profile')" class="w-full text-center text-brand-500 py-3 text-sm">← К списку заказов</button>`;
      c.innerHTML = html;
    },

    // ----- Cart Actions -----
    async addToCart(variantId) {
      try {
        await api('/cart/items', {
          method: 'POST',
          body: JSON.stringify({ variant_id: variantId, quantity: 1 }),
        });
        this.cartCount++;
        this.updateCartBadge();
        tg?.HapticFeedback?.notificationOccurred('success');
        if (tg) tg.showPopup({ title: 'Добавлено', message: 'Товар добавлен в корзину', buttons: [{ type: 'ok' }] });
        else alert('Товар добавлен в корзину');
      } catch (err) {
        if (tg) tg.showPopup({ title: 'Ошибка', message: err.message, buttons: [{ type: 'ok' }] });
        else alert(err.message);
      }
    },

    async updateCartItem(itemId, qty) {
      if (qty <= 0) return this.removeCartItem(itemId);
      await api(`/cart/items/${itemId}`, {
        method: 'PATCH',
        body: JSON.stringify({ quantity: qty }),
      });
      this.render('cart');
    },

    async removeCartItem(itemId) {
      await api(`/cart/items/${itemId}`, { method: 'DELETE' });
      this.cartCount = Math.max(0, this.cartCount - 1);
      this.updateCartBadge();
      this.render('cart');
    },

    checkout() {
      this.navigate('checkout');
    },

    updateCartBadge() {
      const el = document.getElementById('cart-badge');
      if (this.cartCount > 0) {
        el.textContent = this.cartCount;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    },

    // ----- Product Card Component -----
    _productCard(p) {
      const minPrice = p.variants.length ? Math.min(...p.variants.map(v => v.price)) : p.base_price;
      return `
        <button onclick="App.navigate('product', '${p.slug}')"
          class="shrink-0 w-40 bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow text-left border border-gray-100">
          <div class="w-full h-32 bg-gray-100 flex items-center justify-center overflow-hidden">
            ${p.main_image ? `<img src="${p.main_image}" alt="${esc(p.name)}" class="w-full h-full object-cover"/>` : `<span class="text-4xl">🍵</span>`}
          </div>
          <div class="p-2.5">
            <p class="font-medium text-brand-700 text-sm truncate">${esc(p.name)}</p>
            <p class="text-xs text-gray-500 mt-0.5">${p.category.icon || '🍃'} ${esc(p.category.name)}</p>
            <p class="text-sm font-bold text-brand-500 mt-1">от ${fmtPrice(minPrice)} ₽</p>
          </div>
        </button>
      `;
    },
  };

  // ---------- Utilities ----------
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtPrice(n) {
    return Number(n).toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
  }

  function statusLabel(s) {
    const map = {
      pending: 'Ожидает', paid: 'Оплачен', refunded: 'Возврат',
      failed: 'Ошибка', cancelled: 'Отменён',
    };
    return map[s] || s;
  }

  // ---------- Init ----------
  document.addEventListener('DOMContentLoaded', async () => {
    App.navigate('home');
    // Инициализируем счётчик корзины в фоне
    try {
      const cart = await api('/cart');
      const count = cart.items?.reduce((s, i) => s + i.quantity, 0) || 0;
      App.cartCount = count;
      App.updateCartBadge();
    } catch (_) {}
  });
  </script>
</body>
</html>
